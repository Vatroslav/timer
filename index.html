<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0f1115">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="30s">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<title>30s Timer</title>
<style>
  :root {
    --bg: #0f1115;
    --track: #262b36;
    --accent: #4ade80;
    --accent-done: #f87171;
    --text: #f4f6fb;
    --muted: #8b93a7;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, "Segoe UI", Roboto, system-ui, sans-serif;
    overflow: hidden; overscroll-behavior: none;
    user-select: none; -webkit-user-select: none;
  }
  body {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: clamp(28px, 7vh, 64px);
    padding: max(24px, env(safe-area-inset-top)) 24px max(24px, env(safe-area-inset-bottom));
  }
  .dial { position: relative; width: min(78vw, 60vh); aspect-ratio: 1; }
  svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .track { fill: none; stroke: var(--track); stroke-width: 7; }
  .progress {
    fill: none; stroke: var(--accent); stroke-width: 7; stroke-linecap: round;
    transition: stroke .25s ease;
  }
  .readout {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .count {
    font-size: clamp(64px, 26vw, 200px);
    font-weight: 700; line-height: 1; font-variant-numeric: tabular-nums;
    letter-spacing: -0.03em;
  }
  .label { margin-top: 10px; font-size: clamp(13px, 3.6vw, 18px); color: var(--muted); letter-spacing: .12em; text-transform: uppercase; }
  .done .count { color: var(--accent-done); }
  .done .progress { stroke: var(--accent-done); }
  button {
    appearance: none; border: 0; cursor: pointer;
    background: var(--accent); color: #07120a;
    font-size: clamp(18px, 5vw, 24px); font-weight: 700;
    padding: 18px 0; width: min(78vw, 60vh);
    border-radius: 999px; letter-spacing: .02em;
    transition: background .2s ease, transform .05s ease;
  }
  button:active { transform: scale(.98); }
  button.running { background: var(--track); color: var(--text); }
  button.done { background: var(--accent-done); color: #1a0707; }
</style>
</head>
<body>
  <div class="dial" id="dial">
    <svg viewBox="0 0 100 100">
      <circle class="track" cx="50" cy="50" r="45"></circle>
      <circle class="progress" id="ring" cx="50" cy="50" r="45"></circle>
    </svg>
    <div class="readout">
      <div class="count" id="count">30</div>
      <div class="label" id="label">seconds</div>
    </div>
  </div>
  <button id="btn">Start</button>

<script>
(() => {
  "use strict";
  const DURATION = 30;
  const R = 45, C = 2 * Math.PI * R;

  const elDial  = document.getElementById("dial");
  const elRing   = document.getElementById("ring");
  const elCount  = document.getElementById("count");
  const elLabel  = document.getElementById("label");
  const btn      = document.getElementById("btn");

  elRing.style.strokeDasharray = C;

  let state = "idle";      // idle | running | overtime
  let startTime = 0;
  let rafId = null;
  let audioCtx = null;
  let wakeLock = null;
  let signalled = false;   // has the 0-mark beep/Restart transition fired this run

  function drawRing(frac, reverse) {
    const f = Math.max(0, Math.min(1, frac));
    // reverse grows the arc from the same point the countdown emptied toward,
    // so the red fill sweeps the same rotational way the green ring did
    elRing.style.strokeDashoffset = reverse ? C * (1 + f) : C * (1 - f);
  }

  function setState(next) {
    state = next;
    elDial.classList.toggle("done", next === "overtime");
    if (next === "idle") {
      btn.textContent = "Start"; btn.className = "";
      elLabel.textContent = "seconds";
      drawRing(1);
      elCount.textContent = DURATION;
    } else if (next === "running") {
      btn.textContent = "Stop"; btn.className = "running";
      elLabel.textContent = "remaining";
    } else if (next === "overtime") {
      btn.textContent = "Restart"; btn.className = "done";
      elLabel.textContent = "overtime";
    }
  }

  function tick() {
    const elapsed = (performance.now() - startTime) / 1000;
    if (elapsed < DURATION) {
      // counting down: green ring empties from full to empty
      const remaining = DURATION - elapsed;
      drawRing(remaining / DURATION);
      elCount.textContent = Math.ceil(remaining);
    } else {
      // reached 0: fire the beep + Restart transition once, then keep going
      if (!signalled) reachZero();
      const over = elapsed - DURATION;
      if (over >= DURATION) {                 // overtime complete: red ring full
        drawRing(1, true);
        elCount.textContent = DURATION;
        releaseWakeLock();
        rafId = null;
        return;
      }
      // overtime: red ring fills, sweeping the same way the green countdown emptied
      drawRing(over / DURATION, true);
      elCount.textContent = Math.floor(over);
    }
    rafId = requestAnimationFrame(tick);
  }

  function start() {
    if (rafId) cancelAnimationFrame(rafId);  // kill any live loop (e.g. Restart during overtime)
    initAudio();
    requestWakeLock();
    startTime = performance.now();
    signalled = false;
    setState("running");
    drawRing(1);
    elCount.textContent = DURATION;
    rafId = requestAnimationFrame(tick);
  }

  function reset() {
    if (rafId) cancelAnimationFrame(rafId);
    rafId = null;
    releaseWakeLock();
    signalled = false;
    setState("idle");
  }

  // reached 0: sound + Restart button appear, countdown flips into red-fill overtime
  function reachZero() {
    signalled = true;
    setState("overtime");
    beep();
    if (navigator.vibrate) navigator.vibrate([180, 90, 180, 90, 320]);
  }

  // --- audio (created on user gesture so mobile allows playback) ---
  function initAudio() {
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === "suspended") audioCtx.resume();
    } catch (e) { /* no audio available */ }
  }
  function beep() {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    [0, 0.22, 0.44].forEach((t, i) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = "sine";
      o.frequency.value = i === 2 ? 1175 : 880;
      g.gain.setValueAtTime(0.0001, now + t);
      g.gain.exponentialRampToValueAtTime(0.4, now + t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, now + t + 0.18);
      o.connect(g).connect(audioCtx.destination);
      o.start(now + t); o.stop(now + t + 0.2);
    });
  }

  // --- wake lock (keep screen on during countdown) ---
  async function requestWakeLock() {
    try {
      if ("wakeLock" in navigator) wakeLock = await navigator.wakeLock.request("screen");
    } catch (e) { /* ignore */ }
  }
  function releaseWakeLock() {
    try { if (wakeLock) { wakeLock.release(); wakeLock = null; } } catch (e) {}
  }

  // re-acquire wake lock + resync if app returns to foreground mid-run
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState !== "visible") return;
    if ((state === "running" || state === "overtime") && rafId) {
      requestWakeLock();
      cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(tick);
    }
  });

  btn.addEventListener("click", () => {
    if (state === "running") reset();
    else start();           // idle or overtime -> start fresh
  });

  setState("idle");

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
  }
})();
</script>
</body>
</html>
